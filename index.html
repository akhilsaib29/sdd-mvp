*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2230;--border:#2a3244;
  --text:#e6edf3;--muted:#7d8590;--dim:#4a5568;
  --accent:#f78166;--accent2:#79c0ff;--accent3:#56d364;--accent4:#e3b341;
  --red:#f85149;--green:#3fb950;--amber:#d29922;--blue:#58a6ff;
}
body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;overflow-y:auto}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:40}
.content{padding:24px;flex:1}
.sb-brand{padding:16px 16px 8px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sb-logo{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sb-title{font-weight:700;font-size:0.88rem;letter-spacing:0.04em}
.sb-subtitle{font-size:0.65rem;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.sb-section{padding:4px 10px;font-size:0.62rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-top:8px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:6px;margin:1px 8px;cursor:pointer;transition:all 0.15s;font-size:0.82rem;color:var(--muted);border:1px solid transparent}
.sb-item:hover{background:var(--card);color:var(--text)}
.sb-item.active{background:rgba(247,129,102,0.1);color:var(--accent);border-color:rgba(247,129,102,0.2)}
.sb-icon{font-size:14px;width:18px;text-align:center}
.sb-badge{margin-left:auto;background:var(--red);color:white;font-size:0.6rem;padding:1px 6px;border-radius:10px;font-family:'IBM Plex Mono',monospace}
.tb-page{font-weight:600;font-size:0.9rem}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-notif{position:relative;cursor:pointer;padding:6px 8px;border-radius:6px;font-size:16px}
.tb-notif:hover{background:var(--card)}
.tb-notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--surface)}
.tb-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
.tb-user:hover{background:var(--card)}
.tb-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#0d1117}
.tb-username{font-size:0.8rem;font-weight:500}
.tb-role{font-size:0.68rem;color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:transform 0.15s}
.kpi-card:hover{transform:translateY(-2px)}
.kpi-label{font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.kpi-val{font-size:1.9rem;font-weight:700;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:0.72rem;color:var(--muted)}
.kpi-card.red{border-color:rgba(248,81,73,0.3);background:rgba(248,81,73,0.05)}.red .kpi-val{color:var(--red)}
.kpi-card.green{border-color:rgba(63,185,80,0.3);background:rgba(63,185,80,0.05)}.green .kpi-val{color:var(--green)}
.kpi-card.amber{border-color:rgba(210,153,34,0.3);background:rgba(210,153,34,0.05)}.amber .kpi-val{color:var(--amber)}
.kpi-card.blue{border-color:rgba(88,166,255,0.3);background:rgba(88,166,255,0.05)}.blue .kpi-val{color:var(--blue)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-title{font-weight:600;font-size:0.9rem}
table{width:100%;border-collapse:collapse;min-width:600px}
th{background:rgba(255,255,255,0.03);padding:10px 16px;text-align:left;font-size:0.7rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 16px;border-bottom:1px solid rgba(42,50,68,0.5);font-size:0.82rem;vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.mono{font-family:'IBM Plex Mono',monospace;font-size:0.75rem}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:0.67rem;font-family:'IBM Plex Mono',monospace;font-weight:500;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0.8;flex-shrink:0}
.b-critical{background:rgba(248,81,73,0.15);color:#f85149}
.b-high{background:rgba(210,153,34,0.15);color:#e3b341}
.b-medium{background:rgba(88,166,255,0.15);color:#79c0ff}
.b-low{background:rgba(63,185,80,0.15);color:#56d364}
.b-active{background:rgba(63,185,80,0.15);color:#56d364}
.b-inactive,.b-archived,.b-expired,.b-withdrawn{background:rgba(125,133,144,0.15);color:#7d8590}
.b-suspended{background:rgba(248,81,73,0.15);color:#f85149}
.b-pending{background:rgba(210,153,34,0.15);color:#e3b341}
.b-approved{background:rgba(63,185,80,0.15);color:#56d364}
.b-rejected{background:rgba(248,81,73,0.15);color:#f85149}
.b-open{background:rgba(63,185,80,0.15);color:#56d364}
.b-closed{background:rgba(248,81,73,0.15);color:#f85149}
.b-upcoming{background:rgba(88,166,255,0.15);color:#79c0ff}
.b-unread{background:rgba(247,129,102,0.15);color:#f78166}
.b-read{background:rgba(125,133,144,0.15);color:#7d8590}
.b-sent{background:rgba(63,185,80,0.15);color:#56d364}
.b-success{background:rgba(63,185,80,0.15);color:#56d364}
.b-failure{background:rgba(248,81,73,0.15);color:#f85149}
.b-create,.b-approve{background:rgba(63,185,80,0.15);color:#56d364}
.b-update{background:rgba(88,166,255,0.15);color:#79c0ff}
.b-reject,.b-delete{background:rgba(248,81,73,0.15);color:#f85149}
.b-alert{background:rgba(248,81,73,0.15);color:#f85149}
.b-approval{background:rgba(63,185,80,0.15);color:#56d364}
.b-rejection{background:rgba(248,81,73,0.15);color:#f85149}
.b-compliance-notice,.b-deadline{background:rgba(210,153,34,0.15);color:#e3b341}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:0.8rem;font-weight:500;font-family:'Epilogue',sans-serif;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#0d1117;border-color:var(--accent)}
.btn-primary:hover{background:#ff9580}
.btn-secondary{background:transparent;color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--card)}
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent;padding:5px 10px}

.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.5)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
.modal-title{font-weight:700;font-size:1rem}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.single{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:0.72rem;color:var(--muted);font-weight:500;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.06em}
.form-input,.form-select,.form-textarea{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:0.83rem;font-family:'Epilogue',sans-serif;width:100%;transition:border-color 0.15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(247,129,102,0.1)}
.form-textarea{resize:vertical;min-height:80px}
option{background:var(--surface);color:var(--text)}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px}
.page-title{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.page-sub{font-size:0.8rem;color:var(--muted)}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.detail-row{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;width:160px;flex-shrink:0;padding-top:2px}
.detail-val{font-size:0.83rem;flex:1;word-break:break-word;white-space:normal}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:0}
.info-card-title{font-weight:600;font-size:0.88rem;margin-bottom:14px}
.tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:0.7rem;background:var(--surface);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.chart-wrap{display:flex;align-items:flex-end;gap:6px;height:80px}
.chart-bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:all 0.3s}
.chart-labels{display:flex;gap:6px;margin-top:6px}
.chart-lbl{flex:1;font-size:0.6rem;color:var(--muted);text-align:center;font-family:'IBM Plex Mono',monospace}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--green);color:var(--green);padding:12px 20px;border-radius:8px;font-size:0.83rem;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:slideToast 0.3s ease}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes slideToast{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.feed-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.feed-row:last-child{border-bottom:none}
.feed-name{font-size:0.83rem;font-weight:500}
.feed-sub{font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace}
@media(max-width:900px){
  .sidebar{width:180px}.main{margin-left:180px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
}
</style>

  return <span className={`badge ${cls}`}>{value}</span>;
};

const Modal = ({ title, onClose, onSubmit, children, submitLabel="Save", submitClass="btn-primary" }) => (
  <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
    <div className="modal">
      <div className="modal-header">
        <span className="modal-title">{title}</span>
        <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
      </div>
      <div className="modal-body">{children}</div>
      <div className="modal-footer">
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        {onSubmit && <button className={`btn ${submitClass}`} onClick={onSubmit}>{submitLabel}</button>}
      </div>
    </div>
  </div>
);

const FRow = ({k,v}) => (
  <div className="detail-row">
    <span className="detail-key">{k}</span>
    <span className="detail-val">{v||"—"}</span>
  </div>
);

// ── UPSI MODULE ───────────────────────────────────────────────────────────────
function UPSIModule({ data, setData, showToast }) {
  const [showAdd, setShowAdd] = useState(false);
  const [detail, setDetail] = useState(null);
  const [filter, setFilter] = useState("All");
  const blank = { title:"", description:"", category:"Financial Results", severity:"High", source:"", status:"Active" };
  const [form, setForm] = useState(blank);
  const cats = ["Financial Results","Merger & Acquisition","Dividend Decision","Business Strategy","Regulatory Changes","Other"];

  const filtered = filter==="All" ? data.upsi : data.upsi.filter(u=>u.status===filter);

  const submit = () => {
    if(!form.title||!form.source){ showToast("Please fill all required fields","error"); return; }
    const n = { id:uid("UPSI"), ...form, createdDate:now().split(" ")[0], authorizedBy:"U002", createdBy:"U002", windowId:"" };
    const log = { id:uid("AL"), userId:"U002", action:"Create", module:"UPSI Repository", recordId:n.id, prevValue:"", newValue:`${form.title} created`, timestamp:now(), ip:"192.168.1.10", description:"New UPSI record created", status:"Success" };
    setData(d=>({...d, upsi:[n,...d.upsi], auditLogs:[log,...d.auditLogs]}));
    showToast("UPSI record created"); setShowAdd(false); setForm(blank);
  };

  return (
    <div>
      <div className="page-header">
        <div><div className="page-title">UPSI Repository</div><div className="page-sub">Centralized store of Unpublished Price Sensitive Information</div></div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ New UPSI Record</button>
      </div>
      <div className="filter-bar">
        {["All","Active","Archived"].map(s=>(
          <button key={s} className={`btn btn-sm ${filter===s?"btn-primary":"btn-secondary"}`} onClick={()=>setFilter(s)}>{s}</button>
        ))}
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Title</th><th>Category</th><th>Severity</th><th>Source</th><th>Date</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {filtered.map(u=>(
              <tr key={u.id}>
                <td className="mono">{u.id}</td>
                <td style={{fontWeight:500,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{u.title}</td>
                <td><span className="tag">{u.category}</span></td>
                <td><Badge value={u.severity}/></td>
                <td style={{color:"var(--muted)"}}>{u.source}</td>
                <td className="mono">{u.createdDate}</td>
                <td><Badge value={u.status}/></td>
                <td><button className="btn btn-ghost btn-sm" onClick={()=>setDetail(u)}>View →</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showAdd && (
        <Modal title="New UPSI Record" onClose={()=>{setShowAdd(false);setForm(blank)}} onSubmit={submit} submitLabel="Create Record">
          <div className="form-row single"><div className="form-group"><label className="form-label">Information Title *</label><input className="form-input" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. Q4 Financial Results"/></div></div>
          <div className="form-row single"><div className="form-group"><label className="form-label">Description</label><textarea className="form-textarea" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Detailed description..."/></div></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Category *</label>
              <select className="form-select" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                {cats.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Severity *</label>
              <select className="form-select" value={form.severity} onChange={e=>setForm({...form,severity:e.target.value})}>
                {["Critical","High","Medium","Low"].map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Source / Department *</label><input className="form-input" value={form.source} onChange={e=>setForm({...form,source:e.target.value})} placeholder="e.g. Finance"/></div>
            <div className="form-group"><label className="form-label">Status</label>
              <select className="form-select" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                <option>Active</option><option>Archived</option>
              </select>
            </div>
          </div>
        </Modal>
      )}

      {detail && (
        <Modal title={`${detail.id} — Detail`} onClose={()=>setDetail(null)} onSubmit={null}>
          <FRow k="ID" v={detail.id}/>
          <FRow k="Title" v={detail.title}/>
          <FRow k="Category" v={detail.category}/>
          <FRow k="Severity" v={<Badge value={detail.severity}/>}/>
          <FRow k="Description" v={detail.description}/>
          <FRow k="Source / Dept" v={detail.source}/>
          <FRow k="Created Date" v={detail.createdDate}/>
          <FRow k="Status" v={<Badge value={detail.status}/>}/>
          <FRow k="Authorized By" v={detail.authorizedBy}/>
          <FRow k="Related Window" v={detail.windowId||"—"}/>
        </Modal>
      )}
    </div>
  );
}

function TradingWindow({ data, setData, showToast }) {
  const blank = { name:"", openDate:"", closeDate:"", reason:"Results Declaration", status:"Upcoming", applicableTo:"All Employees", upsiId:"" };
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState(blank);

  const submit = () => {
    if(!form.name||!form.openDate||!form.closeDate){ showToast("Fill required fields","error"); return; }
    const tw = { id:uid("TW"), ...form, createdBy:"U002" };
    const log = { id:uid("AL"), userId:"U002", action:"Create", module:"Trading Window", recordId:tw.id, prevValue:"", newValue:`${form.name} created`, timestamp:now(), ip:"192.168.1.10", description:"Trading window created", status:"Success" };
    setData(d=>({...d, tradingWindows:[...d.tradingWindows,tw], auditLogs:[log,...d.auditLogs]}));
    showToast("Trading window created"); setShowAdd(false); setForm(blank);
  };

  const toggle = (id) => {
    setData(d=>{
      const updated = d.tradingWindows.map(w=>{
        if(w.id!==id) return w;
        const s = w.status==="Closed" ? "Open" : "Closed";
        return {...w, status:s};
      });
      const tw = updated.find(w=>w.id===id);
      const log = { id:uid("AL"), userId:"U002", action:"Update", module:"Trading Window", recordId:id, prevValue:"", newValue:`Status → ${tw.status}`, timestamp:now(), ip:"192.168.1.10", description:"Window status changed", status:"Success" };
      return {...d, tradingWindows:updated, auditLogs:[log,...d.auditLogs]};
    });
    showToast("Window status updated");
  };

  return (
    <div>
      <div className="page-header">
        <div><div className="page-title">Trading Window Calendar</div><div className="page-sub">Manage trading window open/close periods based on UPSI events</div></div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Create Window</button>
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Close Date</th><th>Open Date</th><th>Reason</th><th>Applicable To</th><th>Related UPSI</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>
            {data.tradingWindows.map(w=>(
              <tr key={w.id}>
                <td className="mono">{w.id}</td>
                <td style={{fontWeight:500}}>{w.name}</td>
                <td className="mono">{w.closeDate}</td>
                <td className="mono">{w.openDate}</td>
                <td><span className="tag">{w.reason}</span></td>
                <td style={{color:"var(--muted)"}}>{w.applicableTo}</td>
                <td className="mono">{w.upsiId||"—"}</td>
                <td><Badge value={w.status}/></td>
                <td>
                  <button
                    className={`btn btn-sm ${w.status==="Closed"?"btn-open":"btn-close-win"}`}
                    onClick={()=>toggle(w.id)}
                  >{w.status==="Closed"?"Open":"Close"}</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {showAdd && (
        <Modal title="Create Trading Window" onClose={()=>{setShowAdd(false);setForm(blank)}} onSubmit={submit}>
          <div className="form-row single"><div className="form-group"><label className="form-label">Window Name *</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Q4 Results Blackout"/></div></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Close Date *</label><input className="form-input" type="datetime-local" value={form.closeDate} onChange={e=>setForm({...form,closeDate:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">Open Date *</label><input className="form-input" type="datetime-local" value={form.openDate} onChange={e=>setForm({...form,openDate:e.target.value})}/></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Reason *</label>
              <select className="form-select" value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})}>
                {["Results Declaration","Announcement Pending","Board Meeting","M&A Activity","Regulatory Event"].map(r=><option key={r}>{r}</option>)}

// ── TRADING REQUESTS ──────────────────────────────────────────────────────────
function TradingRequests({ data, setData, showToast, currentUser }) {
  const blank = { requestorId:"", security:"", qty:"", txnType:"Buy", proposedDate:"", reason:"" };
  const [showAdd, setShowAdd] = useState(false);
  const [reviewItem, setReviewItem] = useState(null);
  const [reviewNotes, setReviewNotes] = useState("");
  const [form, setForm] = useState(blank);
  const [filter, setFilter] = useState("All");

  const filtered = filter==="All" ? data.tradingRequests : data.tradingRequests.filter(r=>r.status===filter);

  const submit = () => {
    if(!form.requestorId||!form.security||!form.qty){ showToast("Fill required fields","error"); return; }
    const req = { id:uid("TR"), ...form, qty:parseInt(form.qty), requestedDate:now(), status:"Pending", review:"", approvalDate:"", approvalOfficer:"", conditions:"" };
    const log = { id:uid("AL"), userId:currentUser.id, action:"Create", module:"Trading Request", recordId:req.id, prevValue:"", newValue:`${req.id} submitted`, timestamp:now(), ip:"192.168.1.22", description:"Pre-clearance request submitted", status:"Success" };
    const notif = { id:uid("N"), recipientId:"U002", type:"Approval", subject:`New Trading Request — ${req.id}`, message:`Pre-clearance request submitted for ${req.qty} units of ${req.security}.`, relatedId:req.id, createdDate:now(), read:false, channel:"In-App", deliveryStatus:"Sent" };
    setData(d=>({...d, tradingRequests:[req,...d.tradingRequests], auditLogs:[log,...d.auditLogs], notifications:[notif,...d.notifications]}));
    showToast("Trading request submitted"); setShowAdd(false); setForm(blank);
  };

  const decide = (status) => {
    if(!reviewItem) return;
    const log = { id:uid("AL"), userId:"U002", action:status==="Approved"?"Approve":"Reject", module:"Trading Request", recordId:reviewItem.id, prevValue:"Pending", newValue:status, timestamp:now(), ip:"192.168.1.10", description:`Request ${status.toLowerCase()} by compliance officer`, status:"Success" };
    const notif = { id:uid("N"), recipientId:"U003", type:status==="Approved"?"Approval":"Rejection", subject:`Pre-Clearance ${status} — ${reviewItem.id}`, message:`Your trading request ${reviewItem.id} has been ${status.toLowerCase()}.${reviewNotes?" Note: "+reviewNotes:""}`, relatedId:reviewItem.id, createdDate:now(), read:false, channel:"In-App", deliveryStatus:"Sent" };
    setData(d=>({
      ...d,
      tradingRequests: d.tradingRequests.map(r=>r.id===reviewItem.id ? {...r, status, review:reviewNotes, approvalDate:now(), approvalOfficer:"U002"} : r),
      auditLogs: [log,...d.auditLogs],
      notifications: [notif,...d.notifications]
    }));
    showToast(`Request ${status.toLowerCase()}`); setReviewItem(null); setReviewNotes("");
  };

  return (
    <div>
      <div className="page-header">
        <div><div className="page-title">Pre-Clearance Requests</div><div className="page-sub">Trading request workflow — submit, review, approve or reject</div></div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ New Request</button>
      </div>
      <div className="filter-bar">
        {["All","Pending","Approved","Rejected"].map(s=>(
          <button key={s} className={`btn btn-sm ${filter===s?"btn-primary":"btn-secondary"}`} onClick={()=>setFilter(s)}>{s}</button>
        ))}
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Requestor</th><th>Security</th><th>Qty</th><th>Type</th><th>Proposed</th><th>Submitted</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>
            {filtered.map(r=>{
              const dp=data.designatedPersons.find(d=>d.id===r.requestorId);
              return (
                <tr key={r.id}>
                  <td className="mono">{r.id}</td>
                  <td style={{fontWeight:500}}>{dp?.name||r.requestorId}</td>
                  <td><strong style={{color:"var(--accent2)"}}>{r.security}</strong></td>
                  <td className="mono">{r.qty.toLocaleString()}</td>
                  <td><span className="tag">{r.txnType}</span></td>
                  <td className="mono">{r.proposedDate}</td>
                  <td className="mono" style={{color:"var(--muted)",fontSize:"0.72rem"}}>{r.requestedDate}</td>
                  <td><Badge value={r.status}/></td>
                  <td>
                    {r.status==="Pending"
                      ? <button className="btn btn-ghost btn-sm" onClick={()=>setReviewItem(r)}>Review →</button>
                      : <span className="mono" style={{color:"var(--muted)",fontSize:"0.7rem"}}>{r.approvalDate?.split(" ")[0]}</span>
                    }
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showAdd && (
        <Modal title="Submit Pre-Clearance Request" onClose={()=>{setShowAdd(false);setForm(blank)}} onSubmit={submit} submitLabel="Submit Request">
          <div className="form-row">
            <div className="form-group"><label className="form-label">Designated Person *</label>
              <select className="form-select" value={form.requestorId} onChange={e=>setForm({...form,requestorId:e.target.value})}>
                <option value="">— Select —</option>
                {data.designatedPersons.map(dp=><option key={dp.id} value={dp.id}>{dp.name} ({dp.position})</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Security Symbol *</label><input className="form-input" value={form.security} onChange={e=>setForm({...form,security:e.target.value.toUpperCase()})} placeholder="e.g. RELIANCE"/></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Quantity *</label><input className="form-input" type="number" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})} placeholder="500"/></div>
            <div className="form-group"><label className="form-label">Transaction Type *</label>
              <select className="form-select" value={form.txnType} onChange={e=>setForm({...form,txnType:e.target.value})}>
                <option>Buy</option><option>Sell</option><option>Exercise</option><option>Other</option>
              </select>
            </div>
          </div>
          <div className="form-row single"><div className="form-group"><label className="form-label">Proposed Trade Date</label><input className="form-input" type="date" value={form.proposedDate} onChange={e=>setForm({...form,proposedDate:e.target.value})}/></div></div>
          <div className="form-row single"><div className="form-group"><label className="form-label">Reason for Request</label><textarea className="form-textarea" value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})} placeholder="Explain the purpose of this trade..."/></div></div>
        </Modal>
      )}

      {reviewItem && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">Review Request — {reviewItem.id}</span>
              <button className="btn btn-ghost btn-sm" onClick={()=>setReviewItem(null)}>✕</button>
            </div>
            <div className="modal-body">
              {[
                ["Requestor", data.designatedPersons.find(d=>d.id===reviewItem.requestorId)?.name],
                ["Security", reviewItem.security],
                ["Quantity", reviewItem.qty],
                ["Transaction Type", reviewItem.txnType],
                ["Proposed Date", reviewItem.proposedDate],
                ["Reason", reviewItem.reason],
              ].map(([k,v])=><FRow key={k} k={k} v={v}/>)}
              <div style={{marginTop:16}}>
                <label className="form-label" style={{marginBottom:6,display:"block"}}>Compliance Officer Notes</label>
                <textarea className="form-textarea" value={reviewNotes} onChange={e=>setReviewNotes(e.target.value)} placeholder="Add review notes or conditions..."/>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setReviewItem(null)}>Cancel</button>
              <button className="btn btn-reject" onClick={()=>decide("Rejected")}>✕ Reject</button>
              <button className="btn btn-approve" onClick={()=>decide("Approved")}>✓ Approve</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

            </div>
          </div>
          <div className="form-row single"><div className="form-group"><label className="form-label">Email *</label><input className="form-input" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Department</label><input className="form-input" value={form.dept} onChange={e=>setForm({...form,dept:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── MOUNT ─────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
