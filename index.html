.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(15,31,61,0.06)}
.content{padding:24px;flex:1}

.sb-title{font-weight:700;font-size:0.88rem;letter-spacing:0.04em;color:#fff}

.sb-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.sb-item.active{background:rgba(232,98,42,0.2);color:#ff8c5a;border-color:rgba(232,98,42,0.35)}
.sb-icon{font-size:14px;width:18px;text-align:center}
.sb-badge{margin-left:auto;background:var(--red);color:white;font-size:0.6rem;padding:1px 6px;border-radius:10px;font-family:'IBM Plex Mono',monospace}
.tb-page{font-weight:600;font-size:0.9rem;color:var(--navy)}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-notif{position:relative;cursor:pointer;padding:6px 8px;border-radius:6px;font-size:16px}
.tb-notif:hover{background:var(--bg)}
.tb-notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--surface)}
.tb-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
.tb-user:hover{background:var(--bg)}
.tb-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff}
.tb-username{font-size:0.8rem;font-weight:500;color:var(--navy)}
.tb-role{font-size:0.68rem;color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all 0.15s;box-shadow:0 1px 4px rgba(15,31,61,0.06)}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(15,31,61,0.1)}
.kpi-label{font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.kpi-val{font-size:1.9rem;font-weight:700;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:0.72rem;color:var(--muted)}
.kpi-card.red{border-color:rgba(224,36,36,0.25);background:rgba(224,36,36,0.04)}.red .kpi-val{color:var(--red)}
.kpi-card.green{border-color:rgba(5,122,85,0.25);background:rgba(5,122,85,0.04)}.green .kpi-val{color:var(--green)}
.kpi-card.amber{border-color:rgba(180,83,9,0.25);background:rgba(180,83,9,0.04)}.amber .kpi-val{color:var(--amber)}
.kpi-card.blue{border-color:rgba(26,86,219,0.25);background:rgba(26,86,219,0.04)}.blue .kpi-val{color:var(--blue)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto;box-shadow:0 1px 4px rgba(15,31,61,0.05)}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-title{font-weight:600;font-size:0.9rem;color:var(--navy)}
table{width:100%;border-collapse:collapse;min-width:600px}
th{background:#f7f9fc;padding:10px 16px;text-align:left;font-size:0.7rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 16px;border-bottom:1px solid #edf0f7;font-size:0.82rem;vertical-align:middle;white-space:nowrap;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7f9fc}
.mono{font-family:'IBM Plex Mono',monospace;font-size:0.75rem}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:0.67rem;font-family:'IBM Plex Mono',monospace;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0.8;flex-shrink:0}
.b-critical{background:rgba(224,36,36,0.1);color:#b91c1c}
.b-high{background:rgba(180,83,9,0.1);color:#92400e}
.b-medium{background:rgba(26,86,219,0.1);color:#1e40af}
.b-low{background:rgba(5,122,85,0.1);color:#065f46}
.b-active{background:rgba(5,122,85,0.1);color:#065f46}
.b-inactive,.b-archived,.b-expired,.b-withdrawn{background:#f1f3f9;color:#6b7a99}

.b-pending{background:rgba(180,83,9,0.1);color:#92400e}

.b-rejected{background:rgba(224,36,36,0.1);color:#b91c1c}

.b-closed{background:rgba(224,36,36,0.1);color:#b91c1c}
.b-upcoming{background:rgba(26,86,219,0.1);color:#1e40af}
.b-unread{background:rgba(232,98,42,0.12);color:#c2410c}
.b-read{background:#f1f3f9;color:#6b7a99}
.b-sent{background:rgba(5,122,85,0.1);color:#065f46}
.b-success{background:rgba(5,122,85,0.1);color:#065f46}
.b-failure{background:rgba(224,36,36,0.1);color:#b91c1c}
.b-create,.b-approve{background:rgba(5,122,85,0.1);color:#065f46}
.b-update{background:rgba(26,86,219,0.1);color:#1e40af}
.b-reject,.b-delete{background:rgba(224,36,36,0.1);color:#b91c1c}
.b-alert{background:rgba(224,36,36,0.1);color:#b91c1c}
.b-approval{background:rgba(5,122,85,0.1);color:#065f46}
.b-rejection{background:rgba(224,36,36,0.1);color:#b91c1c}
.b-compliance-notice,.b-deadline{background:rgba(180,83,9,0.1);color:#92400e}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:0.8rem;font-weight:500;font-family:'Epilogue',sans-serif;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 1px 3px rgba(232,98,42,0.3)}
.btn-primary:hover{background:#d4551e}
.btn-secondary{background:#fff;color:var(--navy);border-color:var(--border);box-shadow:0 1px 2px rgba(15,31,61,0.06)}
.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--muted);border-color:transparent;padding:5px 10px}
.btn-ghost:hover{background:var(--bg);color:var(--navy)}
.btn-approve{background:rgba(5,122,85,0.08);color:#065f46;border-color:rgba(5,122,85,0.25)}
.btn-approve:hover{background:rgba(5,122,85,0.15)}
.btn-reject{background:rgba(224,36,36,0.06);color:#b91c1c;border-color:rgba(224,36,36,0.25)}
.btn-reject:hover{background:rgba(224,36,36,0.12)}
.btn-sm{padding:4px 10px;font-size:0.75rem}

.btn-link:hover{color:var(--navy)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,31,61,0.45);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:#fff;border:1px solid var(--border);border-radius:14px;width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(15,31,61,0.18)}
.modal-lg{width:700px}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-weight:700;font-size:1rem;color:var(--navy)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.single{grid-template-columns:1fr}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:0.72rem;color:var(--muted);font-weight:600;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.06em}

.toast.error{border-color:var(--red);color:var(--red)}
@keyframes slideToast{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.feed-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #edf0f7}

.feed-sub{font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace}

.multi-select-box{background:#fff;border:1px solid #c8d2e8;border-radius:6px;max-height:180px;overflow-y:auto;transition:border-color 0.15s}

.multi-select-group-label{padding:6px 12px 4px;font-size:0.62rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;background:#f7f9fc;border-bottom:1px solid var(--border);position:sticky;top:0}

.multi-select-item:hover{background:#f7f9fc}
.multi-select-item.selected{background:rgba(232,98,42,0.06)}
.multi-select-cb{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.multi-select-name{font-size:0.82rem;font-weight:500;color:var(--navy)}
.multi-select-sub{font-size:0.68rem;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.selected-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:20px}
.selected-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:rgba(232,98,42,0.08);border:1px solid rgba(232,98,42,0.2);border-radius:100px;font-size:0.7rem;color:#c2410c;font-family:'IBM Plex Mono',monospace}
.selected-tag-x{cursor:pointer;opacity:0.7;font-size:0.8rem;line-height:1}
.selected-tag-x:hover{opacity:1}

/* Sender picker */
.sender-row{display:flex;gap:10px;align-items:center}
.sender-row .form-select{flex:1}

/* Section divider inside modal */
.modal-section{font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;padding:12px 0 8px;border-top:1px solid var(--border);margin-top:4px}
.modal-section:first-child{border-top:none;padding-top:0;margin-top:0}

@media(max-width:900px){
  .sidebar{width:180px}.main{margin-left:180px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
}

.b-pending-review{background:rgba(180,83,9,0.1);color:#92400e}
.b-disclosed{background:rgba(5,122,85,0.1);color:#065f46}

.b-rating-team{background:rgba(26,86,219,0.1);color:#1e40af}
.b-compliance-team{background:rgba(232,98,42,0.1);color:#c2410c}
</style>
